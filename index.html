<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Checklist</title><style>body{font-family:Arial;background:#f3f6f9;margin:0} .header{background:linear-gradient(90deg,#003b5c,#007a53);color:white;padding:20px;text-align:center}.container{max-width:600px;margin:auto;padding:16px}.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.08)}label{display:block;font-weight:bold;margin-top:10px}input,textarea,select{width:100%;padding:12px;border:1px solid #ccd6dd;border-radius:12px;box-sizing:border-box}button{width:100%;padding:14px;border:none;border-radius:14px;font-weight:bold;margin-top:12px} .green{background:#007a53;color:white}.blue{background:#003b5c;color:white}.item{background:#f7fafc;padding:12px;border-radius:12px;margin-top:10px}.success{background:#e8f8f0;border:1px solid #8fd3ae;padding:12px;border-radius:12px;margin-top:12px}</style></head><body><div class='header'><h1>ARAMCO CHECKLIST SYSTEM</h1><p>Digital Mobile Inspection Workflow</p></div><div class='container'><div class='card'><label>Unit Name</label><input id='unit'><label>User Name / Badge</label><input id='user'><label>Select Checklist</label><select id='type' onchange='loadChecklist()'><option value=''>Select</option><option value='club'>Club Car Checklist</option></select></div><div id='area'></div><div class='card'><label>General Remarks</label><textarea id='remarks'></textarea><label>Signature</label><input id='signature'><button class='green' onclick='saveChecklist()'>Save Checklist</button><button class='blue' onclick='emailChecklist()'>Send By Email</button><div id='msg'></div></div></div><script>const lists={club:['Battery level acceptable','Tires in good condition','Brakes functioning','Horn working','No visible damage']};function loadChecklist(){const type=document.getElementById('type').value;const area=document.getElementById('area');if(!type){area.innerHTML='';return;}let html='<div class="card"><h2>Club Car Checklist</h2>';lists[type].forEach((item,i)=>{html+=`<div class="item"><b>${i+1}. ${item}</b><br><label><input type="radio" name="q${i}" value="OK"> OK</label><label><input type="radio" name="q${i}" value="NOT OK"> NOT OK</label><label><input type="radio" name="q${i}" value="N/A"> N/A</label><input id="remark${i}" placeholder="Remarks"></div>`});html+='</div>';area.innerHTML=html;}function report(){let text='ARAMCO CHECKLIST\n\n';text+='Unit: '+document.getElementById('unit').value+'\n';text+='User: '+document.getElementById('user').value+'\n';lists.club.forEach((item,i)=>{const selected=document.querySelector('input[name="q'+i+'"]:checked');text+=item+' = '+(selected?selected.value:'BLANK')+'\n';});text+='Remarks: '+document.getElementById('remarks').value+'\n';text+='Signature: '+document.getElementById('signature').value;return text;}function saveChecklist(){const blob=new Blob([report()],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Checklist_Report.txt';a.click();document.getElementById('msg').innerHTML='<div class="success">Checklist saved successfully.</div>';}function emailChecklist(){window.location.href='mailto:?subject=ARAMCO Checklist Report&body='+encodeURIComponent(report());}</script></body></html>
